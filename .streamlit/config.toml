[theme]
base="light"
primaryColor="#0369a1"
backgroundColor="#f0f9ff"
secondaryBackgroundColor="#e0f2fe"
textColor="#0c4a6e"
font="sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"

[runner]
magicEnabled = true
fastReruns = true
