name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install black ruff
    
    - name: Check code formatting with Black
      run: black --check . || echo "Black formatting issues found"
      continue-on-error: true
    
    - name: Lint with Ruff
      run: ruff check . || echo "Ruff linting issues found"
      continue-on-error: true
  
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install mypy types-requests
    
    - name: Run MyPy
      run: mypy . --ignore-missing-imports || echo "Type checking issues found"
      continue-on-error: true
  
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Bandit
      run: |
        python -m pip install --upgrade pip
        pip install bandit[toml]
    
    - name: Run Bandit security scan
      run: bandit -r . -ll || echo "Security scan complete"
      continue-on-error: true
  
  build:
    name: Build and Import Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Download NLP models
      run: |
        python -m spacy download en_core_web_sm
        python -c "import nltk; nltk.download('punkt'); nltk.download('stopwords'); nltk.download('wordnet')"
    
    - name: Verify imports
      run: |
        python -c "import streamlit; print('✅ Streamlit OK')"
        python -c "import plotly; print('✅ Plotly OK')"
        python -c "import sklearn; print('✅ Scikit-learn OK')"
        python -c "import nltk; print('✅ NLTK OK')"
        python -c "import sentence_transformers; print('✅ Sentence Transformers OK')"
        python -c "from app.config import settings; print('✅ Config OK')"
        echo "✅ All imports successful!"
